# Continuous integration for ArcTerm.
#
# Runs on every push to main and every PR. Single-platform (macOS) because
# that's our only officially-supported target — `llama-cpp-2`'s Metal
# feature is macOS-only, and cross-platform Tauri builds introduce enough
# platform-specific quirks (webkit2gtk on Linux, webview2 on Windows)
# that supporting them would double our CI surface for no user benefit
# today. Linux / Windows users are welcome to fork and add their own
# workflows; the Rust + TS code itself is portable.
#
# What this verifies:
#   * Rust compiles (`cargo check`)
#   * Rust passes linting (`cargo clippy`) — warnings fail the job
#   * Unit tests pass (`cargo test`)
#   * TypeScript + Vite bundle cleanly (`pnpm vite:build`)
#
# Not verified here:
#   * `tauri build` (the full release bundle) — covered by release.yml
#     on version tags; too slow to run on every push.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs so a rapid-fire push only uses one runner-slot.
# Keeps our free GH Actions minutes from piling up on no-op commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Deployment target for llama-cpp-sys-2's C++ build (std::filesystem is
  # macOS 10.15+). BOTH variables are set because cargo/cc-rs read
  # MACOSX_DEPLOYMENT_TARGET but cmake-rs (used under the hood by
  # llama-cpp-sys-2's CMakeLists) only honors CMAKE_OSX_DEPLOYMENT_TARGET.
  # Keeping the pair in sync between CI and release workflows prevents
  # "works on CI, fails on release" drift.
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  check:
    name: Check (macOS)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rust: stable toolchain + clippy/rustfmt components for the lint
      # step below. Swatinem/rust-cache hashes Cargo.lock and caches the
      # entire target/ across runs, dropping a clean compile from ~8 min
      # to ~1-2 min on cache hit.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # pnpm + Node. pnpm/action-setup is preferred over corepack because
      # we pin `packageManager` in root package.json — the action reads
      # that and installs the exact version for reproducibility.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Frontend build. Vite will surface TS errors here; we treat the
      # build as the type-check because @arcterm/desktop doesn't have a
      # standalone `tsc --noEmit` step today.
      - name: Build frontend
        run: pnpm --filter @arcterm/desktop vite:build

      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets

      - name: Cargo clippy
        working-directory: apps/desktop/src-tauri
        # -D warnings promotes warnings to errors — we want CI to fail
        # on any new warning, not just hard errors. Keeps the code
        # base warning-free over time.
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test

      # Dependency advisory scan. Fails CI on any unhandled RustSec entry
      # so a newly-published advisory against one of our deps (or a
      # transitive dep) surfaces on the next push instead of lurking.
      #
      # Ignored advisories — every entry has been triaged.
      #
      # Triage cadence: review this entire list on every tauri-v2 minor
      # bump (e.g. 2.10 -> 2.11). Most entries are tauri-transitive and
      # naturally resolve when tauri upgrades its own deps. A new
      # advisory against a crate NOT listed here will fail CI, which is
      # what we want.
      #
      # Last reviewed: 2026-04-19 against tauri 2.10.3 + llama-cpp-2 0.1.
      #
      #   * GTK3 / glib (RUSTSEC-2024-0411..0420, 0429): Linux-only tauri
      #     backend deps. ArcTerm is macOS-only; unreachable from the
      #     shipped binary. Drop once tauri migrates off gtk-rs 0.18.
      #     [Expected clear: tauri v3 Linux backend migration.]
      #   * Unmaintained transitive build deps (RUSTSEC-2017-0008
      #     serial, 2024-0370 proc-macro-error, 2025-0057 fxhash,
      #     2025-0075/0080/0081/0098/0100 unic-*): build-time only; no
      #     runtime impact. [Expected clear: downstream tauri-utils
      #     moves off html5ever/kuchikiki.]
      #   * RUSTSEC-2026-0097 (rand): unsound only when used with a
      #     custom logger; pulled in at BUILD TIME via tauri-utils ->
      #     kuchikiki -> selectors -> phf_codegen -> rand. Not in the
      #     shipped binary.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Cargo audit
        working-directory: apps/desktop/src-tauri
        run: >-
          cargo audit --deny warnings
          --ignore RUSTSEC-2017-0008
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2024-0411
          --ignore RUSTSEC-2024-0412
          --ignore RUSTSEC-2024-0413
          --ignore RUSTSEC-2024-0414
          --ignore RUSTSEC-2024-0415
          --ignore RUSTSEC-2024-0416
          --ignore RUSTSEC-2024-0417
          --ignore RUSTSEC-2024-0418
          --ignore RUSTSEC-2024-0419
          --ignore RUSTSEC-2024-0420
          --ignore RUSTSEC-2024-0429
          --ignore RUSTSEC-2025-0057
          --ignore RUSTSEC-2025-0075
          --ignore RUSTSEC-2025-0080
          --ignore RUSTSEC-2025-0081
          --ignore RUSTSEC-2025-0098
          --ignore RUSTSEC-2025-0100
          --ignore RUSTSEC-2026-0097
