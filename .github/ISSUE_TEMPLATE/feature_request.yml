name: Feature request
description: Suggest an improvement or new capability for ArcTerm.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please skim the **Phase 7
        status & what's left** section in
        [`CLAUDE.md`](../blob/main/CLAUDE.md) and the
        **Out of scope** section in
        [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md) — your idea
        might already be on the roadmap, or outside the current scope
        (e.g. Linux/Windows support).

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
        - label: This is within the project scope described in CONTRIBUTING.md.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: |
        Describe the *problem* first, not the solution. "I can't see the
        exit code of my last command at a glance" is more useful than
        "add a status bar" — it invites discussion of alternatives.
      placeholder: |
        When I'm skimming through a long session, I can't tell at a
        glance which commands failed. I have to scroll back and look
        for the ✗ marker.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Rough sketches, keybindings, or UI mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you'd prefer the one above.

  - type: dropdown
    id: size
    attributes:
      label: Rough size
      description: Your best guess — helps prioritize.
      options:
        - Small (keybind, config flag, one-file change)
        - Medium (new UI surface, new IPC command)
        - Large (architectural — needs discussion before code)
    validations:
      required: true

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Are you willing to work on this?
      options:
        - label: I'd like to open a PR for this (after alignment on the approach).
