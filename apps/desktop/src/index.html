<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ipc: http://ipc.localhost" />
    <title>ArcTerm</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/input-editor.css" />
  </head>
  <body>
    <!--
      Phase 2 layout:
        - #terminal-frame hosts xterm (scrollable shell output)
        - #input-dock holds the prompt bar + custom input editor, pinned
          below the terminal. This replaces the shell's own prompt.
    -->
    <main id="app">
      <div id="terminal-frame">
        <div id="terminal"></div>
      </div>
      <div id="input-dock">
        <div id="prompt-bar">
          <span class="prompt-icon" aria-hidden="true">📁</span>
          <span id="prompt-cwd" class="prompt-cwd">~</span>
        </div>
        <div id="input-area">
          <span class="prompt-sigil" aria-hidden="true">❯</span>
          <div id="input-editor-host"></div>
        </div>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
