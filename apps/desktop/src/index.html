<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      SECURITY: CSP applies in BOTH dev and production.
        - Production: tauri.conf.json's `app.security.csp` sends this
          policy as an HTTP Content-Security-Policy header on every
          response served by the custom protocol handler.
        - Dev: vite serves the bundle from http://localhost:1420 and
          does NOT set the response header, so only this meta tag
          enforces. Both mechanisms active in prod; meta tag is the
          single source of truth in dev.
      Keep the two in sync — any change here MUST also be made in
      tauri.conf.json. `connect-src 'self'` allows the ws://localhost:1420
      Vite HMR socket (same-origin) in dev and the custom protocol in
      prod; `ipc:` and `http://ipc.localhost` are Tauri's IPC channels.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ipc: http://ipc.localhost" />
    <title>ArcTerm</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/sidebar.css" />
    <link rel="stylesheet" href="./styles/input-editor.css" />
    <link rel="stylesheet" href="./styles/history-overlay.css" />
    <link rel="stylesheet" href="./styles/ai-panel.css" />
    <link rel="stylesheet" href="./styles/completion-overlay.css" />
    <link rel="stylesheet" href="./styles/settings-panel.css" />
  </head>
  <body>
    <!--
      Phase 4 layout:
        #app is a horizontal flex row.
          #sidebar        — fixed-width session list on the left
          #workspace      — fills remaining space, stacks terminals + input
            #terminal-stack — all session xterms live here; only the active
                              session's element is visible (others are
                              display:none so their buffers keep streaming
                              without rendering work).
            #input-dock   — prompt bar + custom input editor, pinned below
                            the terminal stack. Drives whichever session
                            is currently active.
    -->
    <main id="app">
      <aside id="sidebar" aria-label="ArcTerm sessions">
        <header class="sidebar-header">
          <span class="sidebar-title">ArcTerm</span>
          <button id="new-session-btn" class="sidebar-new" title="New session (⌘T)" aria-label="New session">+</button>
        </header>
        <div class="sidebar-search-wrap">
          <input id="sidebar-search" class="sidebar-search"
                 type="text" placeholder="Filter sessions…"
                 spellcheck="false" autocorrect="off" autocapitalize="off" />
        </div>
        <ul id="session-list" class="session-list"></ul>
      </aside>
      <section id="workspace">
        <div id="terminal-stack"></div>
        <div id="input-dock">
          <div id="prompt-bar">
            <span class="prompt-icon" aria-hidden="true">📁</span>
            <span id="prompt-cwd" class="prompt-cwd">~</span>
            <span id="prompt-branch" class="prompt-branch hidden" aria-label="git branch"></span>
            <span id="ai-status" class="prompt-ai-status hidden" aria-live="polite"></span>
          </div>
          <div id="input-area">
            <span class="prompt-sigil" aria-hidden="true">❯</span>
            <div id="input-editor-host"></div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
