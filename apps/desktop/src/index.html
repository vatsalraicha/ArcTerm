<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ipc: http://ipc.localhost" />
    <title>ArcTerm</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <!--
      Phase 1 layout is intentionally minimal:
        - #terminal hosts xterm.js (output + cursor)
      Sidebar, input editor, and AI panel arrive in later phases.
    -->
    <main id="app">
      <!--
        #terminal-frame owns the window cushion (padding). Keeping the
        xterm host (#terminal) padding-free means its content-box equals its
        border-box, so ResizeObserver fires correctly and fit() sees the
        real drawable area every time the window reflows.
      -->
      <div id="terminal-frame">
        <div id="terminal"></div>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
